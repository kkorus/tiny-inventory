# Optional dev overlay: Vite HMR for the web app (no nginx rebuild).
# Usage from repo root:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --scale web=0
# Then open http://localhost:5173 (API stays on http://localhost:3000).
#
# The anonymous volume keeps node_modules off the bind mount so installs stay fast.

services:
  vite:
    image: node:22-bookworm-slim
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: http://localhost:3000
    command: >-
      sh -c "npm ci && npm run dev -w web -- --host 0.0.0.0 --port 5173"
    depends_on:
      server:
        condition: service_started
