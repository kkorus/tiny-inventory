services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tiny
      POSTGRES_PASSWORD: tiny
      POSTGRES_DB: tiny_inventory
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tiny -d tiny_inventory']
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: tiny
      DATABASE_PASSWORD: tiny
      DATABASE_NAME: tiny_inventory
      CORS_ORIGIN: http://localhost:3001,http://127.0.0.1:3001
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        VITE_API_URL: http://localhost:3000
    ports:
      - '3001:80'
    depends_on:
      - server

volumes:
  pgdata:
